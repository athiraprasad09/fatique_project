<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fatigue Prediction</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f7fa;
    margin-top: 50px;
}

h1 {
    color: #333;
}

textarea {
    width: 350px;
    height: 120px;
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    background: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #45a049;
}

.result {
    margin-top: 20px;
    font-size: 18px;
}
</style>

</head>

<body>

<h1>🧠 Cognitive Fatigue Detector</h1>

<textarea id="textBox" placeholder="Start typing here..."></textarea><br>

<button onclick="checkFatigue()">Check Fatigue</button>

<div class="result" id="result"></div>

<script>

let typingData = [];
let lastTime = Date.now();

// Capture typing speed
document.getElementById("textBox").addEventListener("keydown", () => {
    let currentTime = Date.now();
    let delay = currentTime - lastTime;
    typingData.push(delay);
    lastTime = currentTime;
});

// Send data to backend
async function checkFatigue() {

    if (typingData.length === 0) {
        alert("Please type something first!");
        return;
    }

    try {
        const response = await fetch("https://fatigue-project.onrender.com/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ data: typingData })
        });

        const data = await response.json();

        document.getElementById("result").innerHTML =
            "Prediction: " + data.prediction +
            "<br>Average Delay: " + data.avg_delay + " ms" +
            "<br>Samples: " + data.sample_count;

        typingData = [];

    } catch (error) {
        alert("❌ Failed to connect to server");
    }
}

</script>

</body>
</html>
