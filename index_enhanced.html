<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Fatigue Detector | Bread Butter Club</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #718096;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #e2e8f0;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #718096;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #codeInput {
            width: 100%;
            min-height: 200px;
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        #codeInput:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result-card {
            margin-top: 25px;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card.high-fatigue {
            background: #fed7d7;
            border: 2px solid #fc8181;
        }

        .result-card.low-fatigue {
            background: #c6f6d5;
            border: 2px solid #68d391;
        }

        .result-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .result-card.high-fatigue .result-title {
            color: #c53030;
        }

        .result-card.low-fatigue .result-title {
            color: #2f855a;
        }

        .result-details {
            color: #4a5568;
            font-size: 14px;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #a0aec0;
            font-size: 12px;
        }

        .indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #48bb78;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 Cognitive Fatigue Detector</h1>
    <p class="subtitle"><span class="indicator"></span>Real-time typing pattern analysis</p>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="keystrokeCount">0</div>
            <div class="stat-label">Keystrokes</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="avgSpeed">-</div>
            <div class="stat-label">Avg Speed (ms)</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="sessionTime">0s</div>
            <div class="stat-label">Session Time</div>
        </div>
    </div>

    <textarea 
        id="codeInput" 
        placeholder="Start typing your code here... The system will monitor your typing patterns to detect cognitive fatigue."></textarea>

    <button onclick="checkFatigue()">🔍 Analyze Fatigue Level</button>

    <div id="resultCard" class="result-card">
        <div class="result-title" id="resultTitle">-</div>
        <div class="result-details" id="resultDetails">-</div>
    </div>

    <div class="footer">
        Developed by <strong>Bread Butter Club</strong> • Creative & Technical Studio
    </div>
</div>

<script>
let typingData = [];
let lastTime = Date.now();
let sessionStart = Date.now();
let keystrokeCount = 0;

const box = document.getElementById("codeInput");
const resultCard = document.getElementById("resultCard");

// Update session timer
setInterval(() => {
    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
    document.getElementById("sessionTime").textContent = elapsed + "s";
}, 1000);

box.addEventListener("keydown", () => {
    let now = Date.now();
    let interval = now - lastTime;
    
    // Ignore unrealistically long pauses (> 10 seconds)
    if (interval < 10000) {
        typingData.push(interval);
    }
    
    lastTime = now;
    keystrokeCount++;
    
    // Update stats
    document.getElementById("keystrokeCount").textContent = keystrokeCount;
    
    if (typingData.length > 0) {
        const avgSpeed = Math.round(typingData.reduce((a, b) => a + b, 0) / typingData.length);
        document.getElementById("avgSpeed").textContent = avgSpeed;
    }
});

async function checkFatigue() {
    if (typingData.length === 0) {
        alert("Please type some text first!");
        return;
    }

    try {
        const response = await fetch("http://127.0.0.1:5000/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({data: typingData})
        });

        const data = await response.json();
        
        // Display result
        resultCard.style.display = "block";
        
        const isHighFatigue = data.prediction === "High Fatigue";
        resultCard.className = "result-card " + (isHighFatigue ? "high-fatigue" : "low-fatigue");
        
        document.getElementById("resultTitle").textContent = 
            isHighFatigue ? "⚠️ High Fatigue Detected" : "✅ Low Fatigue - You're Sharp!";
        
        document.getElementById("resultDetails").textContent = 
            `Average typing delay: ${data.avg_delay}ms • Samples: ${data.sample_count}`;
        
        // Reset for next session
        typingData = [];
        keystrokeCount = 0;
        sessionStart = Date.now();
        
    } catch (error) {
        console.error("Error:", error);
        alert("Failed to connect to backend. Make sure Flask server is running on http://127.0.0.1:5000");
    }
}
</script>

</body>
</html>
