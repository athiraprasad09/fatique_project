<script>
async function checkFatigue() {
    if (typingData.length === 0) {
        alert("Please type something first!");
        return;
    }

    try {
        console.log("Sending:", typingData);

        const response = await fetch("https://fatigue-project.onrender.com/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ data: typingData })
        });

        const data = await response.json();
        console.log("Response:", data);

        resultCard.style.display = "block";

        const isHighFatigue = data.prediction === "High Fatigue";

        resultCard.className = "result-card " + 
            (isHighFatigue ? "high-fatigue" : "low-fatigue");

        document.getElementById("resultTitle").textContent =
            isHighFatigue ? "⚠️ High Fatigue Detected" : "✅ Low Fatigue";

        document.getElementById("resultDetails").textContent =
            `Average delay: ${data.avg_delay} ms | Samples: ${data.sample_count}`;

        typingData = [];

    } catch (error) {
        console.error(error);
        alert("Server not responding. Please try again.");
    }
}
</script>
